name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["10.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore src/PanoramaMusic.sln

      - name: Build
        run: dotnet build src/PanoramaMusic.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/PanoramaMusic.sln --no-build --configuration Release --verbosity normal

      - name: Format check
        run: dotnet format src/PanoramaMusic.sln --verify-no-changes

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
