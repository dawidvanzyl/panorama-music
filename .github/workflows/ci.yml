name: CI

on:
  push:
    branches:
      - master
      - milestone/**
  pull_request:
    branches:
      - master
      - milestone/**

permissions:
  contents: read

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/PanoramaMusic.sln

      - name: Build
        run: dotnet build src/PanoramaMusic.sln --no-restore --configuration Release /warnaserror

      - name: Test
        run: dotnet test src/PanoramaMusic.sln --no-build --configuration Release --verbosity normal

      - name: Format check
        run: dotnet format src/PanoramaMusic.sln --verify-no-changes

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npx vite build
        working-directory: frontend

      - name: Test
        run: npm run test
        working-directory: frontend
