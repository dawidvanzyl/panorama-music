name: CD

on:
  push:
    tags:
      - "milestone/*"

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        id: trigger
        run: |
          response=$(curl --silent --show-error --fail \
            --write-out "\n%{http_code}" \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "status=$http_code" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$(echo "$body" | jq -r '.deploy.id // empty')" >> "$GITHUB_OUTPUT"
          echo "service_id=$(echo "$body" | jq -r '.deploy.serviceId // empty')" >> "$GITHUB_OUTPUT"
          echo "Deploy triggered — HTTP $http_code"

      - name: Wait for deployment to succeed
        run: |
          deploy_id="${{ steps.trigger.outputs.deploy_id }}"
          service_id="${{ steps.trigger.outputs.service_id }}"

          if [ -z "$deploy_id" ] || [ -z "$service_id" ]; then
            echo "::warning::Could not extract deploy/service IDs from hook response; skipping status poll."
            exit 0
          fi

          echo "Polling Render deployment $deploy_id on service $service_id..."

          for i in $(seq 1 40); do
            status=$(curl --silent --fail \
              --header "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${service_id}/deploys/${deploy_id}" \
              | jq -r '.status // "unknown"')

            echo "Attempt $i/40 — status: $status"

            case "$status" in
              live)
                echo "Deployment succeeded."
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Deployment failed with status: $status"
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error::Timed out waiting for deployment to reach 'live' status."
          exit 1
